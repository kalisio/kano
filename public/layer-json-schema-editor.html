<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer JSON Schema Editor</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/quasar@2.17.4/dist/quasar.prod.css" rel="stylesheet" />
  <style>
    /* Kano brand colours */
    :root {
      --kano-primary:   #72448b;
      --kano-accent:    #b089c5;
      --kano-dark:      #2c1a35;
      --kano-secondary: #e9dfef;
    }

    body { background: #f5f3f7; }

    .property-row:hover {
      background: rgba(114, 68, 139, 0.05);
    }
    .schema-preview {
      font-family: monospace;
      font-size: 13px;
      background: var(--kano-dark);
      color: #e2d9ea;
      border-radius: 4px;
      padding: 16px;
      white-space: pre;
      overflow: auto;
      max-height: 420px;
    }
    .type-chip-string  { background: #ede7f6 !important; color: #4527a0 !important; }
    .type-chip-number  { background: #e8f5e9 !important; color: #2e7d32 !important; }
    .type-chip-boolean { background: #fff3e0 !important; color: #e65100 !important; }
    .drop-zone {
      border: 2px dashed var(--kano-accent);
      border-radius: 8px;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .drop-zone:hover  { border-color: var(--kano-primary); background: #f3eef7; }
    .drop-zone.dragover {
      border-color: var(--kano-primary);
      background: var(--kano-secondary);
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.4.31/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2.17.4/dist/quasar.umd.prod.js"></script>

<script>
const { createApp, ref, computed, reactive } = Vue

const TYPE_COMPONENTS = {
  string:  'form/KTextField',
  number:  'form/KNumberField',
  boolean: 'form/KToggleField'
}

const TYPE_OPTIONS = [
  { label: 'String',  value: 'string' },
  { label: 'Number',  value: 'number' },
  { label: 'Boolean', value: 'boolean' }
]

const KDK_SCHEMA_ID_BASE = 'http://www.kalisio.xyz/schemas/'

function buildSchema (title, properties) {
  const name = title.trim() || 'untitled'
  const schema = {
    $id: `${KDK_SCHEMA_ID_BASE}${name.toLowerCase().replace(/\s+/g, '-')}#`,
    title: name,
    $schema: 'http://json-schema.org/draft-07/schema#',
    type: 'object',
    properties: {}
  }
  for (const prop of properties) {
    if (!prop.name.trim()) continue
    schema.properties[prop.name] = {
      type: prop.type,
      nullable: true,
      field: {
        component: TYPE_COMPONENTS[prop.type],
        label: prop.name
      }
    }
  }
  return schema
}

function parseSchema (schema) {
  const title = schema.title || ''
  const properties = []
  if (schema.properties && typeof schema.properties === 'object') {
    for (const [key, def] of Object.entries(schema.properties)) {
      let type = 'string'
      if (def && typeof def.type === 'string' && ['string', 'number', 'boolean'].includes(def.type)) {
        type = def.type
      }
      properties.push({ name: key, type })
    }
  }
  return { title, properties }
}

const App = {
  template: `
<q-layout view="hHh lpR fFf">
  <q-header elevated style="background: var(--kano-primary)">
    <q-toolbar>
      <q-icon name="edit_square" size="28px" class="q-mr-sm" />
      <q-toolbar-title>Layer JSON Schema Editor</q-toolbar-title>
      <q-btn flat round icon="help_outline" @click="showHelp = true" />
    </q-toolbar>
  </q-header>

  <q-page-container>
    <q-page class="q-pa-md">
      <div class="row q-col-gutter-md">

        <!-- LEFT COLUMN: editor -->
        <div class="col-12 col-md-7">

          <!-- Import / New -->
          <q-card class="q-mb-md">
            <q-card-section class="q-pb-sm">
              <div class="text-subtitle1 text-weight-medium">Schema file</div>
            </q-card-section>
            <q-card-section class="q-pt-none">
              <div
                class="drop-zone q-pa-lg text-center"
                :class="{ dragover: dragging }"
                @dragover.prevent="dragging = true"
                @dragleave.prevent="dragging = false"
                @drop.prevent="onDrop"
                @click="$refs.fileInput.click()"
              >
                <q-icon name="upload_file" size="48px" color="grey-6" />
                <div class="q-mt-sm text-grey-7">
                  Drop a JSON schema file here or <strong>click to browse</strong>
                </div>
                <input ref="fileInput" type="file" accept=".json" style="display:none" @change="onFileChange" />
              </div>
              <div class="row q-mt-sm q-gutter-sm">
                <q-btn outline color="negative" icon="restart_alt" label="Start from scratch" @click="resetSchema" />
                <q-space />
                <q-btn color="primary" icon="download" label="Export schema" @click="exportSchema" :disable="!canExport" />
              </div>
            </q-card-section>
          </q-card>

          <!-- Schema metadata -->
          <q-card class="q-mb-md">
            <q-card-section class="q-pb-sm">
              <div class="text-subtitle1 text-weight-medium">Metadata</div>
            </q-card-section>
            <q-card-section class="q-pt-none">
              <q-input
                v-model="schemaTitle"
                label="Schema title (layer name)"
                outlined
                dense
                hint="Used to build the $id and title fields"
              />
            </q-card-section>
          </q-card>

          <!-- Add property -->
          <q-card class="q-mb-md">
            <q-card-section class="q-pb-sm">
              <div class="text-subtitle1 text-weight-medium">Add property</div>
            </q-card-section>
            <q-card-section class="q-pt-none">
              <div class="row q-gutter-sm items-start">
                <q-input
                  v-model="newPropName"
                  label="Property name"
                  outlined
                  dense
                  class="col"
                  :error="!!newPropNameError"
                  :error-message="newPropNameError"
                  @keyup.enter="addProperty"
                />
                <q-select
                  v-model="newPropType"
                  :options="typeOptions"
                  label="Type"
                  outlined
                  dense
                  emit-value
                  map-options
                  style="min-width: 130px"
                />
                <q-btn color="primary" icon="add" round dense @click="addProperty" style="margin-top:4px" />
              </div>
            </q-card-section>
          </q-card>

          <!-- Properties list -->
          <q-card>
            <q-card-section class="q-pb-sm">
              <div class="row items-center">
                <div class="text-subtitle1 text-weight-medium">Properties</div>
                <q-badge class="q-ml-sm" color="primary">{{ properties.length }}</q-badge>
              </div>
            </q-card-section>

            <q-separator />

            <q-list v-if="properties.length > 0" separator>
              <q-item
                v-for="(prop, idx) in properties"
                :key="idx"
                class="property-row"
                dense
              >
                <q-item-section avatar>
                  <q-icon name="label_outline" color="grey-6" />
                </q-item-section>
                <q-item-section>
                  <q-item-label v-if="editingIdx !== idx" class="text-body2">{{ prop.name }}</q-item-label>
                  <q-input
                    v-else
                    v-model="editingName"
                    dense
                    borderless
                    autofocus
                    @keyup.enter="saveEdit(idx)"
                    @keyup.escape="cancelEdit"
                  />
                </q-item-section>
                <q-item-section side>
                  <div class="row items-center q-gutter-xs">
                    <q-select
                      v-model="prop.type"
                      :options="typeOptions"
                      dense
                      borderless
                      emit-value
                      map-options
                      style="min-width: 100px"
                    >
                      <template #prepend>
                        <q-chip
                          dense
                          :class="'type-chip-' + prop.type"
                          class="q-mr-xs"
                          style="font-size:11px; height:20px"
                        >{{ prop.type }}</q-chip>
                      </template>
                    </q-select>
                    <q-btn
                      v-if="editingIdx !== idx"
                      flat round dense
                      icon="edit"
                      size="sm"
                      color="grey-7"
                      @click="startEdit(idx)"
                    />
                    <q-btn
                      v-else
                      flat round dense
                      icon="check"
                      size="sm"
                      color="positive"
                      @click="saveEdit(idx)"
                    />
                    <q-btn
                      flat round dense
                      icon="delete_outline"
                      size="sm"
                      color="negative"
                      @click="removeProperty(idx)"
                    />
                  </div>
                </q-item-section>
              </q-item>
            </q-list>

            <q-card-section v-else class="text-center text-grey-6 q-py-xl">
              <q-icon name="playlist_add" size="48px" />
              <div class="q-mt-sm">No properties yet. Add one above or import a schema file.</div>
            </q-card-section>
          </q-card>
        </div>

        <!-- RIGHT COLUMN: preview -->
        <div class="col-12 col-md-5">
          <q-card style="position: sticky; top: 16px">
            <q-card-section class="q-pb-sm">
              <div class="row items-center">
                <div class="text-subtitle1 text-weight-medium">Schema preview</div>
                <q-space />
                <q-btn flat dense icon="content_copy" size="sm" color="grey-7" @click="copySchema" label="Copy" />
              </div>
            </q-card-section>
            <q-separator />
            <q-card-section class="q-pa-sm">
              <div class="schema-preview">{{ schemaPreview }}</div>
            </q-card-section>
          </q-card>
        </div>

      </div>
    </q-page>
  </q-page-container>

  <!-- Help dialog -->
  <q-dialog v-model="showHelp">
    <q-card style="min-width: 360px; max-width: 520px">
      <q-card-section style="background: var(--kano-dark)" class="text-white">
        <div class="text-h6">How to use</div>
      </q-card-section>
      <q-card-section>
        <q-list dense>
          <q-item>
            <q-item-section avatar><q-icon name="upload_file" color="primary" /></q-item-section>
            <q-item-section>Drop or select an existing Layer JSON schema file to edit it.</q-item-section>
          </q-item>
          <q-item>
            <q-item-section avatar><q-icon name="add_circle" color="primary" /></q-item-section>
            <q-item-section>Add properties by entering a name, choosing a type (string / number / boolean) and clicking +.</q-item-section>
          </q-item>
          <q-item>
            <q-item-section avatar><q-icon name="edit" color="primary" /></q-item-section>
            <q-item-section>Click the edit icon to rename a property inline.</q-item-section>
          </q-item>
          <q-item>
            <q-item-section avatar><q-icon name="download" color="primary" /></q-item-section>
            <q-item-section>Export downloads a JSON schema compatible with Kano layers (Draft-07, form/KTextField etc.).</q-item-section>
          </q-item>
        </q-list>
        <q-separator class="q-my-sm" />
        <div class="text-caption text-grey-7">
          Generated schemas follow the KDK <code>schema</code> format with
          <code>$schema: "http://json-schema.org/draft-07/schema#"</code> and
          <code>field.component</code> mapped to the appropriate KDK form component.
        </div>
      </q-card-section>
      <q-card-actions align="right">
        <q-btn flat label="Close" color="primary" v-close-popup />
      </q-card-actions>
    </q-card>
  </q-dialog>

  <!-- Notifications -->
  <div></div>
</q-layout>
  `,

  setup () {
    const $q = Quasar.useQuasar()

    const schemaTitle = ref('')
    const properties  = ref([])
    const newPropName = ref('')
    const newPropType = ref('string')
    const newPropNameError = ref('')
    const dragging    = ref(false)
    const showHelp    = ref(false)
    const editingIdx  = ref(-1)
    const editingName = ref('')

    const typeOptions = TYPE_OPTIONS

    const schemaPreview = computed(() => {
      return JSON.stringify(buildSchema(schemaTitle.value, properties.value), null, 2)
    })

    const canExport = computed(() => schemaTitle.value.trim().length > 0)

    function validatePropName (name) {
      if (!name.trim()) return 'Name is required.'
      if (properties.value.some(p => p.name === name.trim())) return 'A property with this name already exists.'
      return ''
    }

    function addProperty () {
      const error = validatePropName(newPropName.value)
      if (error) { newPropNameError.value = error; return }
      newPropNameError.value = ''
      properties.value.push({ name: newPropName.value.trim(), type: newPropType.value })
      newPropName.value = ''
      newPropType.value = 'string'
    }

    function removeProperty (idx) {
      if (editingIdx.value === idx) cancelEdit()
      properties.value.splice(idx, 1)
    }

    function startEdit (idx) {
      editingIdx.value  = idx
      editingName.value = properties.value[idx].name
    }

    function saveEdit (idx) {
      const name = editingName.value.trim()
      if (!name) { cancelEdit(); return }
      const duplicate = properties.value.some((p, i) => i !== idx && p.name === name)
      if (duplicate) {
        $q.notify({ type: 'negative', message: 'Another property already uses that name.' })
        return
      }
      properties.value[idx].name = name
      cancelEdit()
    }

    function cancelEdit () {
      editingIdx.value  = -1
      editingName.value = ''
    }

    function resetSchema () {
      schemaTitle.value = ''
      properties.value  = []
      newPropNameError.value = ''
      cancelEdit()
      $q.notify({ type: 'info', message: 'Schema cleared.' })
    }

    function loadFromObject (obj) {
      try {
        const parsed = parseSchema(obj)
        schemaTitle.value = parsed.title
        properties.value  = parsed.properties
        cancelEdit()
        $q.notify({ type: 'positive', message: `Loaded schema "${parsed.title}" with ${parsed.properties.length} properties.` })
      } catch (e) {
        $q.notify({ type: 'negative', message: 'Failed to parse schema: ' + e.message })
      }
    }

    function readFile (file) {
      if (!file) return
      const reader = new FileReader()
      reader.onload = (e) => {
        try {
          const obj = JSON.parse(e.target.result)
          loadFromObject(obj)
        } catch {
          $q.notify({ type: 'negative', message: 'Invalid JSON file.' })
        }
      }
      reader.readAsText(file)
    }

    function onFileChange (event) {
      readFile(event.target.files[0])
      event.target.value = ''
    }

    function onDrop (event) {
      dragging.value = false
      const file = event.dataTransfer.files[0]
      if (file && file.name.endsWith('.json')) {
        readFile(file)
      } else {
        $q.notify({ type: 'warning', message: 'Please drop a .json file.' })
      }
    }

    function exportSchema () {
      if (!canExport.value) {
        $q.notify({ type: 'warning', message: 'Please enter a schema title before exporting.' })
        return
      }
      const schema   = buildSchema(schemaTitle.value, properties.value)
      const json     = JSON.stringify(schema, null, 2)
      const blob     = new Blob([json], { type: 'application/json' })
      const url      = URL.createObjectURL(blob)
      const a        = document.createElement('a')
      const filename = schema.title.toLowerCase().replace(/\s+/g, '-') + '-schema.json'
      a.href         = url
      a.download     = filename
      a.click()
      URL.revokeObjectURL(url)
      $q.notify({ type: 'positive', message: `Exported ${filename}` })
    }

    function copySchema () {
      navigator.clipboard.writeText(schemaPreview.value).then(() => {
        $q.notify({ type: 'positive', message: 'Schema copied to clipboard.' })
      }).catch(() => {
        $q.notify({ type: 'negative', message: 'Could not copy to clipboard.' })
      })
    }

    return {
      schemaTitle, properties, newPropName, newPropType, newPropNameError,
      typeOptions, dragging, showHelp, editingIdx, editingName,
      schemaPreview, canExport,
      addProperty, removeProperty, startEdit, saveEdit, cancelEdit,
      resetSchema, onFileChange, onDrop, exportSchema, copySchema
    }
  }
}

createApp(App).use(Quasar, {
  config: {
    brand: {
      primary:   '#72448b',
      secondary: '#e9dfef',
      accent:    '#b089c5',
      dark:      '#2c1a35',
      positive:  '#7bb946',
      negative:  '#c74a4a',
      warning:   '#d09931',
      info:      '#b089c5'
    },
    notify: { position: 'bottom-right', timeout: 2500 }
  }
}).mount('#app')
</script>
</body>
